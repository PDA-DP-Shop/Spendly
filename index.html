<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Spendly" />
  <meta name="application-name" content="Spendly" />
  <meta name="theme-color" content="#050B18" />
  
  <!-- SEO meta tags -->
  <meta name="description" content="Spendly - Your private expense tracker. No accounts. No cloud. Everything stays on your phone." />
  <meta name="keywords" content="expense tracker, budget, spending, private, offline" />
  <meta name="author" content="Spendly" />
  
  <!-- Open Graph (WhatsApp, Twitter preview) -->
  <meta property="og:title" content="Spendly - Private Expense Tracker" />
  <meta property="og:description" content="Track expenses privately. No accounts. Works offline." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://spendly.pages.dev" />
  <meta property="og:type" content="website" />
  
  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Spendly" />
  <meta name="twitter:description" content="Private expense tracker for your phone" />
  <meta name="twitter:image" content="/og-image.png" />
  
  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  
  <!-- Apple splash screens -->
  <link rel="apple-touch-startup-image" href="/splash-iphone.png" media="(device-width: 390px)" />
  <link rel="apple-touch-startup-image" href="/splash-ipad.png" media="(device-width: 768px)" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Preload fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  
  <!-- Google tag (gtag.js) -->
  <meta name="google-site-verification" content="MpzLq12J-sy2L4S-AlEpUdci9_mncQTs38MhS2AsyOY" />

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: 'Satoshi', sans-serif; 
      background-color: #050B18;
      color: #F0F4FF;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    #root { 
      min-height: 100dvh;
      max-width: 100vw;
      overflow-x: hidden;
    }
    .font-display { font-family: 'Clash Display', sans-serif; }
    .font-body { font-family: 'Satoshi', sans-serif; }
  </style>

  <title>Spendly - Expense Tracker</title>
</head>
<body>
  <div id="root">
    <!-- Ultra Premium Splash Screen -->
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #050B18; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
      <div style="position: relative; display: flex; align-items: center; justify-content: center;">
        <div style="position: absolute; width: 140px; height: 140px; border-radius: 40px; background: conic-gradient(from 0deg, #0066FF, #00D4FF, #0066FF); animation: aura-spin 3s linear infinite; filter: blur(20px); opacity: 0.4;"></div>
        <img src="/spendly-logo.png" alt="Spendly" style="position: relative; z-index: 10; width: 100px; height: 100px; border-radius: 28px; animation: logo-float 4s ease-in-out infinite; box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);" />
      </div>
      <div style="margin-top: 40px; font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 32px; color: #F0F4FF; letter-spacing: -1px; animation: text-pulse 2s ease-in-out infinite;">Spendly</div>
    </div>
    <style>
      @keyframes aura-spin { 100% { transform: rotate(360deg); } }
      @keyframes logo-float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }
      @keyframes text-pulse {
        0%, 100% { opacity: 0.5; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
