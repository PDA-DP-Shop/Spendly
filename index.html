<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Spendly" />
  <meta name="application-name" content="Spendly" />
  <meta name="theme-color" content="#FFFFFF" />
  
  <!-- SEO meta tags -->
  <meta name="description" content="Spendly - Your private expense tracker. No accounts. No cloud. Everything stays on your phone." />
  <meta name="keywords" content="expense tracker, budget, spending, private, offline" />
  <meta name="author" content="Spendly" />
  
  <!-- Open Graph (WhatsApp, Twitter preview) -->
  <meta property="og:title" content="Spendly - Private Expense Tracker" />
  <meta property="og:description" content="Track expenses privately. No accounts. Works offline." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://spendly.pages.dev" />
  <meta property="og:type" content="website" />
  
  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Spendly" />
  <meta name="twitter:description" content="Private expense tracker for your phone" />
  <meta name="twitter:image" content="/og-image.png" />
  
  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  
  <!-- Apple splash screens -->
  <link rel="apple-touch-startup-image" href="/splash-iphone.png" media="(device-width: 390px)" />
  <link rel="apple-touch-startup-image" href="/splash-ipad.png" media="(device-width: 768px)" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Preload fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Google tag (gtag.js) -->
  <meta name="google-site-verification" content="MpzLq12J-sy2L4S-AlEpUdci9_mncQTs38MhS2AsyOY" />

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { 
      font-family: 'Nunito', sans-serif; 
      background-color: #FFFFFF;
      color: #0F172A;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    #root { 
      min-height: 100dvh;
      max-width: 100vw;
      overflow-x: hidden;
    }
  </style>

  <title>Spendly - Expense Tracker</title>
</head>
<body>
  <div id="root">
    <!-- White Premium Splash Screen -->
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
      <div style="position: relative; display: flex; align-items: center; justify-content: center;">
        <div style="position: absolute; width: 120px; height: 120px; border-radius: 36px; background: linear-gradient(135deg, rgba(124,111,247,0.15), rgba(197,107,176,0.1)); filter: blur(16px); animation: splash-pulse 2s ease-in-out infinite;"></div>
        <img src="/spendly-logo.png" alt="Spendly" style="position: relative; z-index: 10; width: 90px; height: 90px; border-radius: 24px; box-shadow: 0 8px 32px rgba(124,111,247,0.25); animation: logo-float 3s ease-in-out infinite;" />
      </div>
      <div style="margin-top: 24px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 28px; color: #0F172A; letter-spacing: -0.5px;">Spendly</div>
      <div style="margin-top: 8px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.1em;">Neural Engine Loading</div>
      <div style="margin-top: 32px; width: 180px; height: 6px; background: #F8F7FF; border: 1px solid #F0F0F8; border-radius: 100px; overflow: hidden;">
        <div style="height: 100%; background: linear-gradient(135deg, #9B6FE4, #C56BB0); border-radius: 100px; animation: load-bar 1.5s ease-in-out forwards;"></div>
      </div>
    </div>
    <style>
      @keyframes splash-pulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }
      @keyframes logo-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
      @keyframes load-bar { 0%{width:0%} 100%{width:100%} }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
