<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Spendly" />
  <meta name="application-name" content="Spendly" />
  <meta name="theme-color" content="#00C853" />
  
  <!-- SEO meta tags -->
  <meta name="description" content="Spendly - Your private expense tracker. No accounts. No cloud. Everything stays on your phone." />
  <meta name="keywords" content="expense tracker, budget, spending, private, offline" />
  <meta name="author" content="Spendly" />
  
  <!-- Open Graph (WhatsApp, Twitter preview) -->
  <meta property="og:title" content="Spendly - Private Expense Tracker" />
  <meta property="og:description" content="Track expenses privately. No accounts. Works offline." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://spendly.pages.dev" />
  <meta property="og:type" content="website" />
  
  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Spendly" />
  <meta name="twitter:description" content="Private expense tracker for your phone" />
  <meta name="twitter:image" content="/og-image.png" />
  
  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  
  <!-- Apple splash screens -->
  <link rel="apple-touch-startup-image" href="/splash-iphone.png" media="(device-width: 390px)" />
  <link rel="apple-touch-startup-image" href="/splash-ipad.png" media="(device-width: 768px)" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Preload fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <!-- Google tag (gtag.js) -->
  <meta name="google-site-verification" content="MpzLq12J-sy2L4S-AlEpUdci9_mncQTs38MhS2AsyOY" />

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: 'DM Sans', sans-serif; 
      background-color: #F5F5F5;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    #root { 
      min-height: 100dvh;
      max-width: 100vw;
      overflow-x: hidden;
    }
  </style>

  <title>Spendly - Expense Tracker</title>
</head>
<body>
  <div id="root">
    <!-- Ultra Premium Splash Screen -->
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #F5F5F5; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
      <div style="position: relative; display: flex; align-items: center; justify-content: center;">
        <!-- Glowing spinning aura -->
        <div style="position: absolute; width: 130px; height: 130px; border-radius: 35px; background: conic-gradient(from 0deg, #8BC34A, #00C853, #00BCD4, #2196F3, #8BC34A); animation: aura-spin 2s linear infinite; filter: blur(15px); opacity: 0.65;"></div>
        <!-- Floating Logo -->
        <img src="/spendly-logo.png" alt="Spendly" style="position: relative; z-index: 10; width: 120px; height: 120px; border-radius: 26px; animation: logo-float 3s ease-in-out infinite; box-shadow: 0 8px 30px rgba(0,0,0,0.15);" />
      </div>
    </div>
    <style>
      @keyframes aura-spin { 100% { transform: rotate(360deg); } }
      @keyframes logo-float {
        0%, 100% { transform: translateY(0px) scale(0.98); }
        50% { transform: translateY(-10px) scale(1.04); }
      }
      @media (prefers-color-scheme: dark) {
        #splash-screen { background: #0F0F1A !important; }
      }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
