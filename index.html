  <meta name="apple-mobile-web-app-title" content="Spendly" />
  <meta name="application-name" content="Spendly" />
  <meta name="theme-color" content="#FFFFFF" />
  
  <!-- SEO meta tags -->
  <meta name="description" content="Spendly - 100% private offline expense tracker. Manage your budget and track spending without cloud syncing, bank links, or accounts. Secure local money manager." />
  <meta name="keywords" content="offline expense tracker, private budget app, no cloud finance, local storage money manager, secure expense log, manual entry budget, Spendly, expense scanner, UPI QR scanner" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Spendly",
    "operatingSystem": "iOS, Android, Windows, macOS, Linux",
    "applicationCategory": "FinanceApplication",

      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "description": "100% private offline expense tracker and budget manager. No account required."
  }
  </script>
  
  <!-- Open Graph -->
  <meta property="og:title" content="Spendly - Private Offline Expense Tracker" />
  <meta property="og:description" content="Track expenses privately. No accounts. 100% offline." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://spendly-24hrs.pages.dev" />
  <meta property="og:type" content="website" />
  
  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Spendly - 100% Private Budgeting" />
  <meta name="twitter:description" content="Private expense tracker for your phone" />
  <meta name="twitter:image" content="/og-image.png" />

  <link rel="apple-touch-icon" href="/icon-192.png" />

  <link rel="apple-touch-startup-image" href="/splash-iphone.png" media="(device-width: 390px)" />
  <link rel="apple-touch-startup-image" href="/splash-ipad.png" media="(device-width: 768px)" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

  <meta name="google-site-verification" content="MpzLq12J-sy2L4S-AlEpUdci9_mncQTs38MhS2AsyOY" />

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #FFFFFF;
      color: #000000;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      margin: 0;
    }
    #root { 
      min-height: 100dvh;
      max-width: 100vw;
      overflow-x: hidden;
    }
  </style>

  <title>Spendly - Private Finance Node</title>
</head>
<body>
  <div id="root">
    <!-- Uber Minimalist Splash Screen -->
    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
      <div style="position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 48px;">
        <div style="position: absolute; width: 160px; height: 160px; border-radius: 100%; border: 1px solid rgba(0,0,0,0.05); animation: splash-pulse 3s ease-in-out infinite;"></div>
        <img src="/spendly-logo.png" alt="Spendly" style="position: relative; z-index: 10; width: 100px; height: 100px; border-radius: 36px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); filter: grayscale(100%);" />
      </div>
      <div style="font-family: 'Inter', sans-serif; font-weight: 900; font-size: 18px; color: #000000; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 8px;">Spendly</div>
      <div style="font-family: 'Inter', sans-serif; font-weight: 900; font-size: 9px; color: #AFAFAF; text-transform: uppercase; letter-spacing: 0.4em; margin-bottom: 40px;">Neural_System_Init</div>
      <div style="width: 160px; height: 2px; background: #F6F6F6; border-radius: 100px; overflow: hidden;">
        <div style="height: 100%; background: #000000; border-radius: 100px; animation: load-bar 1.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;"></div>
      </div>
    </div>
    <style>
      @keyframes splash-pulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.2)} }
      @keyframes load-bar { 0%{width:0%} 100%{width:100%} }
    </style>
  </div>
  
  <noscript>
    <div style="padding: 20px; font-family: sans-serif; text-align: center;">
      <h1>Spendly - Private Offline Expense Tracker</h1>
      <p>Manage your spending without the cloud. No accounts, no data leaves your phone.</p>
      <p>Key Features: Offline mode, Receipt Scanning, UPI QR Parsing, Secure Local Storage, Personal Finance Intelligence.</p>
      <p>Visit <a href="https://spendly-24hrs.pages.dev">Spendly</a> to manage your budget privately.</p>
    </div>
  </noscript>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
